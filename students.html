<!DOCTYPE html>
<html>

<head>

<title>Students</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<button class="dark-toggle" onclick="toggleDark()">
<i class="fa-solid fa-moon"></i>
</button>

<script>

if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="index.html"
}

</script>

<div class="container">

<h2 class="page-title">Student Management</h2>

<!-- FORM -->

<div class="form-box">

<input id="name" placeholder="Student Name">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="age" type="number" placeholder="Age">

<input id="className" placeholder="Class">

<input id="roll" placeholder="Roll No">

<button onclick="addStudent()" id="addBtn">
<i class="fa-solid fa-user-plus"></i> Add Student
</button>

</div>

<!-- TABLE -->

<div class="table-box">

<h3>Student List</h3>

<input
type="text"
id="search"
placeholder="Search student..."
onkeyup="searchStudent()"
>

<br><br>

<button onclick="exportExcel()">
<i class="fa-solid fa-file-excel"></i> Export Excel
</button>

<table>

<tr>
<th>Name</th>
<th>Gender</th>
<th>Age</th>
<th>Class</th>
<th>Roll</th>
<th>Action</th>
</tr>

<tbody id="list"></tbody>

</table>

</div>

</div>

<script>

let editIndex = -1

/* ADD STUDENT */

function addStudent(){

let students = JSON.parse(localStorage.getItem("students")) || []

let name = document.getElementById("name").value
let gender = document.getElementById("gender").value
let age = document.getElementById("age").value
let className = document.getElementById("className").value
let roll = document.getElementById("roll").value

if(name==""||gender==""||age==""||className==""||roll==""){
alert("Fill all details")
return
}

if(editIndex === -1){

students.push({name,gender,age,className,roll})

}else{

students[editIndex] = {name,gender,age,className,roll}
editIndex = -1

document.getElementById("addBtn").innerHTML =
'<i class="fa-solid fa-user-plus"></i> Add Student'

}

localStorage.setItem("students",JSON.stringify(students))

clearForm()

showStudents()

}

/* SHOW STUDENTS */

function showStudents(){

let students = JSON.parse(localStorage.getItem("students")) || []

list.innerHTML=""

students.forEach((s,i)=>{

list.innerHTML += `

<tr>

<td>${s.name}</td>
<td>${s.gender}</td>
<td>${s.age}</td>
<td>${s.className}</td>
<td>${s.roll}</td>

<td>

<button onclick="editStudent(${i})">
<i class="fa-solid fa-pen"></i>
</button>

<button onclick="deleteStudent(${i})">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</tr>

`

})

}

/* EDIT */

function editStudent(i){

let students = JSON.parse(localStorage.getItem("students"))

document.getElementById("name").value = students[i].name
document.getElementById("gender").value = students[i].gender
document.getElementById("age").value = students[i].age
document.getElementById("className").value = students[i].className
document.getElementById("roll").value = students[i].roll

editIndex = i

document.getElementById("addBtn").innerHTML =
'<i class="fa-solid fa-floppy-disk"></i> Update Student'

}

/* DELETE */

function deleteStudent(i){

let students = JSON.parse(localStorage.getItem("students"))

students.splice(i,1)

localStorage.setItem("students",JSON.stringify(students))

showStudents()

}

/* CLEAR FORM */

function clearForm(){

document.getElementById("name").value=""
document.getElementById("gender").value=""
document.getElementById("age").value=""
document.getElementById("className").value=""
document.getElementById("roll").value=""

}

/* SEARCH */

function searchStudent(){

let input = document.getElementById("search").value.toLowerCase()

let rows = document.querySelectorAll("#list tr")

rows.forEach(row=>{

let name = row.children[0].innerText.toLowerCase()

if(name.includes(input)){
row.style.display=""
}else{
row.style.display="none"
}

})

}

/* EXPORT EXCEL */

function exportExcel(){

let students = JSON.parse(localStorage.getItem("students")) || []

let csv = "Name,Gender,Age,Class,Roll\n"

students.forEach(s=>{
csv += `${s.name},${s.gender},${s.age},${s.className},${s.roll}\n`
})

let blob = new Blob([csv], { type: "text/csv" })

let link = document.createElement("a")

link.href = URL.createObjectURL(blob)

link.download = "students.csv"

link.click()

}

/* DARK MODE */

function toggleDark(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark")
}else{
localStorage.setItem("theme","light")
}

}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark")
}

showStudents()

</script>

</body>
</html>
